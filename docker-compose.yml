version: "3.8"
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: monitor_user
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: monitor_db
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  monitor:
    build: .
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: monitor_user
      DB_PASSWORD: secret
      DB_NAME: monitor_db
    depends_on:
      - db
    restart: unless-stopped

volumes:
  db_data:
